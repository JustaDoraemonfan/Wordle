<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" viewBox="0 0 760 1820" role="img"
     style="background:#ffffff; font-family: Arial, Helvetica, sans-serif;">
  <title>Bashemin Parking Garage Flowchart</title>
  <desc>Flowchart for the Bashemin single-lane parking garage program showing arrival and departure logic for up to 10 cars</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== TITLE ===== -->
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Bashemin Parking Garage — Program Flowchart</text>

  <!-- ===== START ===== -->
  <rect x="280" y="44" width="160" height="40" rx="20" fill="#e8e8e8" stroke="#555" stroke-width="1"/>
  <text x="360" y="69" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Start</text>

  <!-- Arrow: Start -> Read input -->
  <line x1="360" y1="84" x2="360" y2="112" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== READ INPUT (parallelogram) ===== -->
  <polygon points="230,112 510,112 490,158 210,158" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="358" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4d2a">Read next input line</text>
  <text x="358" y="148" text-anchor="middle" font-size="11" fill="#1a4d2a">(action A or D, plus license plate)</text>

  <!-- Arrow: Read -> More input? -->
  <line x1="360" y1="158" x2="360" y2="192" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== DECISION: More input? ===== -->
  <polygon points="360,192 510,232 360,272 210,232" fill="#ede7f6" stroke="#5e35b1" stroke-width="1"/>
  <text x="360" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92">More input</text>
  <text x="360" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92">lines?</text>

  <!-- NO -> END -->
  <line x1="510" y1="232" x2="600" y2="232" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="552" y="224" text-anchor="middle" font-size="11" fill="#555">No</text>
  <rect x="600" y="212" width="100" height="40" rx="20" fill="#e8e8e8" stroke="#555" stroke-width="1"/>
  <text x="650" y="237" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">End</text>

  <!-- YES -> Decision A or D? -->
  <line x1="360" y1="272" x2="360" y2="306" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="372" y="293" font-size="11" fill="#555">Yes</text>

  <!-- ===== DECISION: A or D? ===== -->
  <polygon points="360,306 530,346 360,386 190,346" fill="#ede7f6" stroke="#5e35b1" stroke-width="1"/>
  <text x="360" y="342" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92">Action = A</text>
  <text x="360" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92">(Arrival)?</text>

  <!-- YES (left) -> Arrival branch -->
  <line x1="190" y1="346" x2="100" y2="346" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="143" y="338" text-anchor="middle" font-size="11" fill="#555">Yes</text>

  <!-- NO (right) -> Departure branch -->
  <line x1="530" y1="346" x2="620" y2="346" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="573" y="338" text-anchor="middle" font-size="11" fill="#555">No (D)</text>


  <!-- ============================================================ -->
  <!-- ARRIVAL BRANCH (left column, centered around x=95)           -->
  <!-- ============================================================ -->

  <!-- Print: car arrived (parallelogram) -->
  <polygon points="10,386 190,386 170,428 -10,428" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="92" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d2a">Print: "Car [plate]</text>
  <text x="92" y="418" text-anchor="middle" font-size="11" fill="#1a4d2a">has arrived"</text>

  <!-- Arrow down -->
  <line x1="90" y1="428" x2="90" y2="462" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Decision: Garage full? -->
  <polygon points="90,462 200,498 90,534 -20,498" fill="#ede7f6" stroke="#5e35b1" stroke-width="1"/>
  <text x="90" y="494" text-anchor="middle" font-size="12" font-weight="bold" fill="#311b92">Garage</text>
  <text x="90" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#311b92">full?</text>

  <!-- YES (right) -> Print no room -->
  <line x1="200" y1="498" x2="270" y2="498" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="233" y="490" text-anchor="middle" font-size="11" fill="#555">Yes</text>
  <polygon points="270,478 450,478 430,518 250,518" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="351" y="494" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d2a">Print: "No room,</text>
  <text x="351" y="510" text-anchor="middle" font-size="11" fill="#1a4d2a">car departs without entry"</text>

  <!-- No room -> loop back (dashed) -->
  <path d="M360 478 L360 458 L540 458 L540 122 L490 122" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="544" y="290" font-size="10" fill="#999" transform="rotate(90,544,290)">back to read input</text>

  <!-- NO (down) -> Process: add car -->
  <line x1="90" y1="534" x2="90" y2="568" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="102" y="556" font-size="11" fill="#555">No</text>

  <!-- Process: Add car to back of lane -->
  <rect x="10" y="568" width="180" height="52" rx="6" fill="#dbeafe" stroke="#1d5fa1" stroke-width="1"/>
  <text x="100" y="588" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c2d61">Add car to back</text>
  <text x="100" y="606" text-anchor="middle" font-size="11" fill="#0c2d61">of garage lane</text>

  <!-- Arrow down -->
  <line x1="100" y1="620" x2="100" y2="654" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Print: car stored -->
  <polygon points="10,654 200,654 180,696 -10,696" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="96" y="670" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d2a">Print: "Car [plate]</text>
  <text x="96" y="686" text-anchor="middle" font-size="11" fill="#1a4d2a">stored in garage"</text>

  <!-- Loop back to read input (dashed) -->
  <path d="M95 696 L95 724 L360 724 L360 158" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>


  <!-- ============================================================ -->
  <!-- DEPARTURE BRANCH (right column, centered around x=665)       -->
  <!-- ============================================================ -->

  <!-- Print: car departing -->
  <polygon points="530,386 730,386 710,428 510,428" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="622" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d2a">Print: "Car [plate]</text>
  <text x="622" y="418" text-anchor="middle" font-size="11" fill="#1a4d2a">is departing"</text>

  <!-- Arrow down -->
  <line x1="622" y1="428" x2="622" y2="462" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Process: Set move counter = 0 -->
  <rect x="532" y="462" width="180" height="52" rx="6" fill="#dbeafe" stroke="#1d5fa1" stroke-width="1"/>
  <text x="622" y="482" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c2d61">Set move_count = 0</text>
  <text x="622" y="500" text-anchor="middle" font-size="11" fill="#0c2d61">Initialize temp stack</text>

  <!-- Arrow down -->
  <line x1="622" y1="514" x2="622" y2="548" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Decision: Target car at exit? -->
  <polygon points="622,548 735,588 622,628 509,588" fill="#ede7f6" stroke="#5e35b1" stroke-width="1"/>
  <text x="622" y="584" text-anchor="middle" font-size="12" font-weight="bold" fill="#311b92">Target car</text>
  <text x="622" y="600" text-anchor="middle" font-size="12" font-weight="bold" fill="#311b92">at exit?</text>

  <!-- YES (left) -> drive target car out -->
  <line x1="509" y1="588" x2="440" y2="588" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="473" y="580" text-anchor="middle" font-size="11" fill="#555">Yes</text>

  <!-- Process: Drive target car out -->
  <rect x="340" y="566" width="180" height="52" rx="6" fill="#dbeafe" stroke="#1d5fa1" stroke-width="1"/>
  <text x="430" y="586" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c2d61">Drive target car</text>
  <text x="430" y="604" text-anchor="middle" font-size="11" fill="#0c2d61">out of garage</text>

  <!-- Arrow down -->
  <line x1="430" y1="618" x2="430" y2="652" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Process: Restore displaced cars -->
  <rect x="340" y="652" width="180" height="52" rx="6" fill="#fff3cd" stroke="#b07800" stroke-width="1"/>
  <text x="430" y="672" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3e00">Restore displaced cars</text>
  <text x="430" y="690" text-anchor="middle" font-size="11" fill="#5a3e00">in original order</text>

  <!-- Arrow down -->
  <line x1="430" y1="704" x2="430" y2="738" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Print: car left, N moves -->
  <polygon points="335,738 535,738 515,782 315,782" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="427" y="754" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d2a">Print: "Car [plate] left,</text>
  <text x="427" y="770" text-anchor="middle" font-size="11" fill="#1a4d2a">moved [move_count] times"</text>

  <!-- Loop back to read input -->
  <path d="M430 782 L430 810 L360 810 L360 158" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>

  <!-- NO (down) -> move front blocking car -->
  <line x1="622" y1="628" x2="622" y2="662" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="634" y="650" font-size="11" fill="#555">No</text>

  <!-- Process: Move front car out temporarily -->
  <rect x="532" y="662" width="180" height="52" rx="6" fill="#fff3cd" stroke="#b07800" stroke-width="1"/>
  <text x="622" y="682" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3e00">Move front car out</text>
  <text x="622" y="700" text-anchor="middle" font-size="11" fill="#5a3e00">temporarily; push to stack</text>

  <!-- Arrow down -->
  <line x1="622" y1="714" x2="622" y2="748" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Process: Increment move counter -->
  <rect x="532" y="748" width="180" height="52" rx="6" fill="#dbeafe" stroke="#1d5fa1" stroke-width="1"/>
  <text x="622" y="768" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c2d61">move_count</text>
  <text x="622" y="786" text-anchor="middle" font-size="11" fill="#0c2d61">= move_count + 1</text>

  <!-- Loop back to "Target car at exit?" -->
  <path d="M712 774 L748 774 L748 588 L736 588" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="754" y="683" font-size="10" fill="#999" transform="rotate(90,754,683)">repeat check</text>


  <!-- ===== LEGEND ===== -->
  <rect x="30" y="860" width="700" height="196" rx="8" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="380" y="886" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Legend</text>

  <!-- Terminal -->
  <rect x="56" y="904" width="90" height="30" rx="15" fill="#e8e8e8" stroke="#555" stroke-width="1"/>
  <text x="101" y="924" text-anchor="middle" font-size="11" fill="#333">Terminal</text>

  <!-- Process -->
  <rect x="196" y="904" width="90" height="30" rx="5" fill="#dbeafe" stroke="#1d5fa1" stroke-width="1"/>
  <text x="241" y="924" text-anchor="middle" font-size="11" fill="#0c2d61">Process</text>

  <!-- Decision -->
  <polygon points="380,904 430,919 380,934 330,919" fill="#ede7f6" stroke="#5e35b1" stroke-width="1"/>
  <text x="380" y="924" text-anchor="middle" font-size="11" fill="#311b92">Decision</text>

  <!-- I/O -->
  <polygon points="456,904 580,904 562,934 438,934" fill="#d4edda" stroke="#2e7d46" stroke-width="1"/>
  <text x="511" y="924" text-anchor="middle" font-size="11" fill="#1a4d2a">Input / Output</text>

  <!-- Move/restore -->
  <rect x="620" y="904" width="90" height="30" rx="5" fill="#fff3cd" stroke="#b07800" stroke-width="1"/>
  <text x="665" y="919" text-anchor="middle" font-size="10" fill="#5a3e00">Move / Restore</text>
  <text x="665" y="931" text-anchor="middle" font-size="10" fill="#5a3e00">cars</text>

  <!-- Flow arrows legend -->
  <line x1="56" y1="980" x2="116" y2="980" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="128" y="985" font-size="11" fill="#333">Normal flow</text>

  <line x1="280" y1="980" x2="340" y2="980" stroke="#999" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="352" y="985" font-size="11" fill="#333">Loop / return flow</text>

  <!-- Notes -->
  <text x="56" y="1020" font-size="11" fill="#555">Notes:</text>
  <text x="56" y="1036" font-size="11" fill="#555">• Garage holds max 10 cars in a single lane with one entrance/exit.</text>
  <text x="56" y="1052" font-size="11" fill="#555">• If a departing car is not at the exit, blocking cars are moved out one by one until target is reached.</text>

</svg>
